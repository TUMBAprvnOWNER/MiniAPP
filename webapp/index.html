<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRVN Token Tracker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 100%;
            padding: 16px;
            padding-bottom: 80px;
        }

        /* Header с тикером и ценой */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            padding: 16px;
            background: var(--tg-theme-secondary-bg-color, #f4f4f5);
            border-radius: 12px;
        }

        .token-info {
            flex: 1;
        }

        .ticker {
            font-size: 24px;
            font-weight: 700;
            color: var(--tg-theme-text-color, #000000);
            margin-bottom: 4px;
        }

        .token-name {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #999999);
        }

        .price-info {
            text-align: right;
        }

        .current-price {
            font-size: 24px;
            font-weight: 700;
            color: var(--tg-theme-text-color, #000000);
            margin-bottom: 4px;
        }

        .price-change {
            font-size: 14px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 6px;
            display: inline-block;
        }

        .price-change.positive {
            color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }

        .price-change.negative {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        /* График */
        .chart-container {
            margin-bottom: 20px;
            background: var(--tg-theme-secondary-bg-color, #f4f4f5);
            border-radius: 12px;
            padding: 16px;
        }

        .chart-header {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--tg-theme-text-color, #000000);
        }

        #chart {
            width: 100%;
            height: 300px;
            border-radius: 8px;
        }

        /* Order Book */
        .orderbook-container {
            margin-bottom: 20px;
            background: var(--tg-theme-secondary-bg-color, #f4f4f5);
            border-radius: 12px;
            padding: 16px;
        }

        .orderbook-header {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--tg-theme-text-color, #000000);
        }

        .orderbook {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .orderbook-side {
            background: var(--tg-theme-bg-color, #ffffff);
            border-radius: 8px;
            padding: 12px;
        }

        .orderbook-side-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            text-align: center;
        }

        .orderbook-side-title.bids {
            color: #10b981;
        }

        .orderbook-side-title.asks {
            color: #ef4444;
        }

        .orderbook-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            padding: 4px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .orderbook-row:last-child {
            border-bottom: none;
        }

        .orderbook-price {
            font-weight: 600;
        }

        .orderbook-price.bid {
            color: #10b981;
        }

        .orderbook-price.ask {
            color: #ef4444;
        }

        .orderbook-amount {
            color: var(--tg-theme-hint-color, #999999);
        }

        /* Кнопки навигации */
        .navigation {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--tg-theme-bg-color, #ffffff);
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            padding: 12px 16px;
            display: flex;
            gap: 8px;
            z-index: 1000;
        }

        .nav-button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .nav-button.primary {
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
        }

        .nav-button.secondary {
            background: var(--tg-theme-secondary-bg-color, #f4f4f5);
            color: var(--tg-theme-text-color, #000000);
        }

        .nav-button:active {
            transform: scale(0.98);
            opacity: 0.8;
        }

        /* Loader */
        .loader {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-top-color: var(--tg-theme-button-color, #3390ec);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error */
        .error {
            padding: 16px;
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="token-info">
                <div class="ticker" id="ticker">PRVN</div>
                <div class="token-name" id="tokenName">PRVN Token</div>
            </div>
            <div class="price-info">
                <div class="current-price" id="currentPrice">$0.0000</div>
                <div class="price-change positive" id="priceChange">+0.00%</div>
            </div>
        </div>

        <!-- Chart -->
        <div class="chart-container">
            <div class="chart-header">📊 Свечной график</div>
            <div id="chart"></div>
        </div>

        <!-- Order Book -->
        <div class="orderbook-container">
            <div class="orderbook-header">📖 Рыночный стакан</div>
            <div class="orderbook">
                <div class="orderbook-side">
                    <div class="orderbook-side-title bids">Покупка (Bids)</div>
                    <div id="bids"></div>
                </div>
                <div class="orderbook-side">
                    <div class="orderbook-side-title asks">Продажа (Asks)</div>
                    <div id="asks"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <div class="navigation">
        <a href="https://t.me/prvn_oficial" class="nav-button primary" id="channelBtn">
            📢 Канал
        </a>
        <a href="https://t.me/prvn_oficial" class="nav-button secondary" id="supportBtn">
            💬 Поддержка
        </a>
        <a href="https://t.me/PRVN_admin" class="nav-button secondary" id="adminBtn">
            👨‍💼 Админ
        </a>
    </div>

    <script type="module" src="/main.js"></script>
</body>
</html>
